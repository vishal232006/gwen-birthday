<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Gwen 🌸</title>
    <style>
        /* --- GLOBAL PINK THEME STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffeef2;
            background-image: radial-gradient(#fff0f5 20%, transparent 20%),
                              radial-gradient(#fff0f5 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #5c3a41;
            overflow-x: hidden;
            text-align: center;
        }

        /* --- FLOATING ROMANTIC PARTICLES --- */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart-particle {
            position: absolute;
            bottom: -20px;
            color: #ffb7c5;
            font-size: 20px;
            opacity: 0.7;
            animation: floatUp 8s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-105vh) rotate(360deg); opacity: 0; }
        }

        /* --- CONTAINER & CARD STYLES --- */
        .container {
            position: relative;
            z-index: 1;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px 24px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
            border: 2px solid #fff;
            margin-bottom: 35px;
            transition: transform 0.3s ease, opacity 0.6s ease;
        }

        h2 {
            font-family: 'Georgia', serif;
            color: #d14760;
            font-size: 1.4rem;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #6b4c52;
            margin-bottom: 15px;
        }

        /* --- COUNTDOWN SCREEN SPECIFICS --- */
        #countdown-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffeef2;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .timer-display {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        .time-box {
            background: white;
            padding: 15px;
            border-radius: 16px;
            min-width: 75px;
            box-shadow: 0 8px 20px rgba(233, 114, 134, 0.2);
            border: 1.5px solid #ffdae0;
        }

        .time-num {
            font-size: 2rem;
            font-weight: bold;
            color: #d14760;
            display: block;
        }

        .time-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #a38288;
            letter-spacing: 1px;
        }

        /* --- UNLOCK BUTTON --- */
        .btn {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 117, 140, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }

        .btn:disabled {
            background: #e0cbd0;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* --- MAIN STORY ANCHOR (HIDDEN AT FIRST) --- */
        #story-content {
            display: none;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Floating Background Layer -->
    <div class="floating-hearts" id="hearts-container"></div>

    <!-- COUNTDOWN SCREEN CONTAINER -->
    <div id="countdown-screen">
        <div class="container">
            <div class="card" style="margin-bottom: 0;">
                <div style="font-size: 3rem; margin-bottom: 10px;">🎁</div>
                <h2 style="font-size: 1.6rem;">Gwen's Birthday Countdown</h2>
                <p id="countdown-status">Your special surprise will unlock soon... ✨</p>
                
                <div class="timer-display">
                    <div class="time-box"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
                    <div class="time-box"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
                    <div class="time-box"><span class="time-num" id="minutes">00</span><span class="time-label">Mins</span></div>
                    <div class="time-box"><span class="time-num" id="seconds">00</span><span class="time-label">Secs</span></div>
                </div>

                <button class="btn" id="open-btn" disabled onclick="unlockStory()">Unlock Your Gift 🔒</button>
            </div>
        </div>
    </div>

    <!-- ==========================================
         STORY BOOK SPACE (WE WILL PLACE CHAPTERS INSIDE HERE)
         ========================================== -->
    <div id="story-content" class="container">
        <!-- Chapters will go here next! -->
    </div>

    <script>
        // Set the countdown date here (Example: June 15)
        const birthdayDate = new Date('June 15, 2026 00:00:00').getTime();

        // Floating Hearts Script
        function createHeart() {
            const container = document.getElementById('hearts-container');
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            const symbols = ['🌸', '❤️', '💕', '✨', '🌹'];
            heart.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            container.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 8000);
        }
        setInterval(createHeart, 400);

        // Timer Script
        const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = birthdayDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = String(days).padStart(2, '0');
            document.getElementById("hours").innerText = String(hours).padStart(2, '0');
            document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
            document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');

            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("countdown-status").innerHTML = "🎉 IT'S YOUR BIRTHDAY GWEN! 🎉";
                const openBtn = document.getElementById("open-btn");
                openBtn.disabled = false;
                openBtn.innerText = "Open The Story 📖";
                openBtn.style.background = "linear-gradient(135deg, #e94e6b 0%, #ff2a54 100%)";
            }
        }, 1000);

        function unlockStory() {
            const screen = document.getElementById('countdown-screen');
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
                document.getElementById('story-content').style.display = 'block';
            }, 800);
        }
    </script>
</body>
</html>
