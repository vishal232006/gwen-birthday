<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Gwen 🌸</title>
    <style>
        /* --- GLOBAL PINK THEME STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffeef2;
            background-image: radial-gradient(#fff0f5 20%, transparent 20%),
                              radial-gradient(#fff0f5 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #5c3a41;
            overflow-x: hidden;
            text-align: center;
        }

        /* --- FLOATING ROMANTIC PARTICLES --- */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart-particle {
            position: absolute;
            bottom: -20px;
            color: #ffb7c5;
            font-size: 20px;
            opacity: 0.7;
            animation: floatUp 8s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-105vh) rotate(360deg); opacity: 0; }
        }

        /* --- CONTAINER & CARD STYLES --- */
        .container {
            position: relative;
            z-index: 1;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 24px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
            border: 2px solid #fff;
            margin-bottom: 35px;
            transition: transform 0.3s ease, opacity 0.6s ease;
        }

        h2 {
            font-family: 'Georgia', serif;
            color: #d14760;
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #6b4c52;
            margin-bottom: 15px;
        }

        /* --- COUNTDOWN SCREEN SPECIFICS --- */
        #countdown-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffeef2;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .single-timer-display {
            margin: 25px 0;
            display: inline-block;
        }

        .big-time-box {
            background: white;
            padding: 20px 35px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(233, 114, 134, 0.25);
            border: 2px solid #ffdae0;
        }

        .time-num-large {
            font-size: 3.5rem;
            font-weight: bold;
            color: #d14760;
            display: block;
            line-height: 1;
        }

        .time-label-large {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #a38288;
            letter-spacing: 1.5px;
            margin-top: 5px;
            display: block;
        }

        /* --- UNLOCK BUTTON --- */
        .btn {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 117, 140, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
            width: 100%;
        }

        .btn:disabled {
            background: #e0cbd0;
            color: #ffffff;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* --- MAIN STORY ANCHOR (HIDDEN AT FIRST) --- */
        #story-content {
            display: none;
            padding-top: 20px;
        }

        /* --- REVEAL ANIMATIONS FOR LATER --- */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="floating-hearts" id="hearts-container"></div>

    <div id="countdown-screen">
        <div class="container">
            <div class="card" style="margin-bottom: 0;">
                <div style="font-size: 3rem; margin-bottom: 10px;">🎁</div>
                <h2 style="font-size: 1.6rem; color: #d14760;">Gwen's Birthday Surprise</h2>
                <p id="countdown-status">Your special gift is unlocking... ✨</p>
                
                <div class="single-timer-display">
                    <div class="big-time-box">
                        <span class="time-num-large" id="seconds-counter">09</span>
                        <span class="time-label-large">Seconds Left</span>
                    </div>
                </div>

                <button class="btn" id="open-btn" disabled onclick="unlockStory()">Unlocking... 🔒</button>
            </div>
        </div>
    </div>

    <div id="story-content" class="container">
        </div>

    <script>
        // Pure 9-Second Countdown Logic
        let count = 9;
        const timerInterval = setInterval(function() {
            count--;
            document.getElementById("seconds-counter").innerText = String(count).padStart(2, '0');

            if (count <= 0) {
                clearInterval(timerInterval);
                document.getElementById("countdown-status").innerHTML = "🎉 UNLOCKED FOR YOU! 🎉";
                
                const openBtn = document.getElementById("open-btn");
                openBtn.disabled = false;
                openBtn.innerHTML = "Open The Story 📖";
                openBtn.style.background = "linear-gradient(135deg, #e94e6b 0%, #ff2a54 100%)";
            }
        }, 1000);

        // Background Hearts Generator
        function createHeart() {
            const container = document.getElementById('hearts-container');
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            const symbols = ['🌸', '❤️', '💕', '✨', '🌹'];
            heart.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            container.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 8000);
        }
        setInterval(createHeart, 400);

        // Transition Screen Logic
        function unlockStory() {
            const screen = document.getElementById('countdown-screen');
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
                document.getElementById('story-content').style.display = 'block';
                window.scrollTo(0, 0);
            }, 800);
        }
    </script>
</body>
</html>
